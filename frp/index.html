<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A2K — Advanced Device Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C8962A;
            --gold-bright: #F0C040;
            --gold-dim: rgba(200, 150, 42, 0.15);
            --obsidian: #030507;
            --surface: rgba(8, 13, 22, 0.92);
            --surface-hover: rgba(0, 212, 255, 0.04);
            --cyan: #00D4FF;
            --cyan-dim: rgba(0, 212, 255, 0.08);
            --purple: #A855F7;
            --white: #f8fafc;
            --border: rgba(0, 212, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--obsidian);
            color: var(--white);
            font-family: 'Rajdhani', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            min-height: 100dvh;
        }

        /* ── Background ── */
        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .grid-overlay {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image:
                linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── Scanline ── */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), rgba(0,212,255,0.9), rgba(0,212,255,0.5), transparent);
            box-shadow: 0 0 30px rgba(0,212,255,0.3);
            z-index: 200; pointer-events: none;
            animation: scan 10s linear infinite;
        }
        @keyframes scan { 0% { top: -5px; } 100% { top: 100vh; } }

        /* ── Header ── */
        .glass-header {
            background: rgba(3, 5, 7, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,212,255,0.12);
        }

        .nav-logo {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            color: var(--gold-bright);
            text-shadow: 0 0 20px rgba(240,192,64,0.4);
        }

        /* ── Hero ── */
        .hero-title {
            font-family: 'Cinzel', serif;
            line-height: 0.9;
            letter-spacing: -1px;
        }
        .blue-brand {
            color: var(--cyan);
            text-shadow: 0 0 30px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.2);
        }
        .glow-white {
            color: var(--white);
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* ── Search ── */
        .search-wrap {
            background: rgba(5, 10, 20, 0.95);
            border: 1px solid rgba(0,212,255,0.18);
            transition: border-color 0.2s;
        }
        .search-wrap:focus-within {
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 0 20px rgba(0,212,255,0.1), inset 0 0 20px rgba(0,212,255,0.03);
        }
        .search-wrap input {
            font-family: 'Share Tech Mono', monospace;
            background: transparent;
            border: none;
            outline: none;
            color: #e2e8f0;
            width: 100%;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .search-wrap input::placeholder { color: rgba(100,130,160,0.5); }

        /* ── Section Labels ── */
        .section-dot { flex-shrink: 0; }
        .sec-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
        }

        /* ── Shortcut Cards ── */
        .shortcut-card {
            background: rgba(8,14,24,0.9);
            border: 1px solid var(--border);
            border-bottom: 2px solid rgba(0,212,255,0.08);
            position: relative; overflow: hidden;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
            cursor: pointer;
            -webkit-touch-callout: none;
        }
        .shortcut-card::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(0,212,255,0.06), transparent 70%);
            opacity: 0; transition: opacity 0.2s;
        }
        .shortcut-card:hover::before, .shortcut-card:active::before { opacity: 1; }
        .shortcut-card:hover {
            border-color: rgba(0,212,255,0.35);
            background: rgba(0,212,255,0.04);
            transform: translateY(-2px);
        }
        .shortcut-card:active { transform: scale(0.94); border-color: var(--cyan); }

        /* ── APK Rows ── */
        .apk-row {
            background: rgba(8,14,24,0.9);
            border: 1px solid var(--border);
            border-left: 2px solid rgba(0,212,255,0.25);
            transition: all 0.18s ease;
            position: relative; overflow: hidden;
        }
        .apk-row::after {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
            background: var(--cyan);
            transform: scaleY(0); transform-origin: bottom;
            transition: transform 0.25s ease;
        }
        .apk-row:hover::after { transform: scaleY(1); }
        .apk-row:hover {
            border-color: rgba(0,212,255,0.3);
            background: rgba(0,212,255,0.03);
            transform: translateX(3px);
        }
        .apk-row:active { transform: scale(0.98); }

        .apk-icon-wrap {
            width: 42px; height: 42px; flex-shrink: 0;
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.12);
            display: flex; align-items: center; justify-content: center;
        }

        .btn-exec {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 7px 14px;
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-exec:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 15px rgba(200,150,42,0.4);
        }
        .btn-exec:active { transform: scale(0.95); }

        /* ── GAM Cards ── */
        .gam-card {
            background: rgba(8,14,24,0.9);
            border: 1px solid rgba(168,85,247,0.12);
            border-right: 2px solid rgba(168,85,247,0.2);
            transition: all 0.18s ease;
            position: relative; overflow: hidden;
        }
        .gam-card:hover {
            border-color: rgba(168,85,247,0.4);
            background: rgba(168,85,247,0.04);
            transform: translateY(-2px);
        }
        .gam-card:active { transform: scale(0.95); }

        /* ── Language Toggle ── */
        .lang-btn {
            border: 1px solid rgba(200,150,42,0.4);
            color: var(--gold-bright);
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 10px;
            transition: all 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .lang-btn:hover {
            background: rgba(200,150,42,0.1);
            border-color: var(--gold-bright);
        }

        /* ── Status Bar ── */
        .status-bar {
            background: rgba(3,5,7,0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,212,255,0.1);
        }

        /* ── Ping dot ── */
        @keyframes ping-custom {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.5); }
        }
        .ping-dot { animation: ping-custom 1.5s ease-in-out infinite; }

        /* ── Desktop layout ── */
        @media (min-width: 768px) {
            .desktop-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0 2rem;
            }
            .desktop-col-full { grid-column: 1 / -1; }
            .shortcuts-desktop { grid-template-columns: repeat(4, 1fr) !important; }
        }

        /* ── Mobile touch targets ── */
        @media (max-width: 767px) {
            .apk-row { padding: 14px 12px; }
            .btn-exec { padding: 8px 12px; font-size: 8px; }
            .gam-card { padding: 14px 12px; }
        }

        ::-webkit-scrollbar { width: 0; }

        /* ── Fade in ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s ease forwards; opacity: 0; }
        .fade-up:nth-child(1) { animation-delay: 0.05s; }
        .fade-up:nth-child(2) { animation-delay: 0.10s; }
        .fade-up:nth-child(3) { animation-delay: 0.15s; }
        .fade-up:nth-child(4) { animation-delay: 0.20s; }
        .fade-up:nth-child(5) { animation-delay: 0.25s; }
        .fade-up:nth-child(6) { animation-delay: 0.30s; }
        .fade-up:nth-child(7) { animation-delay: 0.35s; }
        .fade-up:nth-child(8) { animation-delay: 0.40s; }

        /* icon colors */
        .icon-google { color: #4285F4; }
        .icon-samsung { color: #4dabf7; }
        .icon-chrome { color: #EA4335; }
        .icon-settings { color: #94a3b8; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<!-- ───── Header ───── -->
<header class="glass-header sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3.5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="relative w-9 h-9 flex items-center justify-center">
                <div class="absolute inset-0 border border-cyan-500/40 rotate-45 bg-black/60"></div>
                <i class="fas fa-microchip text-cyan-400 text-[11px] relative z-10"></i>
            </div>
            <div>
                <h1 class="nav-logo text-base leading-none">A2K</h1>
                <p class="text-[8px] text-cyan-800 font-mono tracking-[0.25em] uppercase mt-0.5">System v2.0</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <!-- Status indicator -->
            <div class="hidden sm:flex items-center gap-1.5 border border-green-900/50 px-2.5 py-1 bg-green-950/20">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full ping-dot"></div>
                <span class="text-[8px] font-mono text-green-600 tracking-widest uppercase">Secure</span>
            </div>
            <button id="toggleLang" class="lang-btn">
                <img src="https://flagcdn.com/w40/us.png" id="langFlag" class="w-4 border border-white/20" alt="lang">
                <span id="langLabel">EN</span>
            </button>
        </div>
    </div>
</header>

<!-- ───── Main ───── -->
<main class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 pt-7 pb-24">

    <!-- Hero -->
    <div class="mb-8 desktop-col-full">
        <div class="flex items-start gap-4">
            <div class="border-l-2 border-cyan-500 pl-4 flex-1">
                <div class="text-[9px] font-mono text-cyan-600 mb-2 tracking-[0.35em] uppercase" data-i18n="tag">▸ A2K Systems · Tool 002</div>
                <h2 id="heroTitle" class="hero-title text-5xl sm:text-6xl font-black leading-none">
                    <span class="blue-brand">FRP</span><br>
                    <span class="glow-white">A2K</span>
                </h2>
                <p id="heroDesc" class="text-[11px] sm:text-xs text-slate-400 leading-relaxed mt-3 max-w-sm font-medium">
                    Advanced Device Management System. Decrypting protection layers via integrated logic engine.
                </p>
            </div>
            <!-- Desktop stat block -->
            <div class="hidden md:grid grid-cols-2 gap-px bg-cyan-900/20 border border-cyan-900/30 self-start">
                <div class="bg-obsidian px-5 py-3 text-center">
                    <div class="text-xl font-bold font-mono text-cyan-400">13</div>
                    <div class="text-[8px] text-slate-600 uppercase tracking-widest mt-0.5">Modules</div>
                </div>
                <div class="bg-obsidian px-5 py-3 text-center">
                    <div class="text-xl font-bold font-mono text-gold-bright" style="color:var(--gold-bright)">02</div>
                    <div class="text-[8px] text-slate-600 uppercase tracking-widest mt-0.5">Tool ID</div>
                </div>
                <div class="bg-obsidian px-5 py-3 text-center col-span-2">
                    <div class="text-[8px] font-mono text-green-500 tracking-widest uppercase">● Link Secure</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="sticky top-[60px] z-40 py-2.5 mb-8 desktop-col-full" style="background: linear-gradient(to bottom, var(--obsidian) 60%, transparent);">
        <div class="search-wrap flex items-center px-4 py-3">
            <i class="fas fa-terminal text-cyan-600 text-xs mr-3 flex-shrink-0"></i>
            <input type="text" id="searchInput" placeholder="Enter module ID or name..." autocomplete="off" autocorrect="off" spellcheck="false">
            <i class="fas fa-times text-slate-700 text-xs ml-2 cursor-pointer flex-shrink-0" id="clearSearch" style="display:none" onclick="document.getElementById('searchInput').value='';document.getElementById('searchInput').dispatchEvent(new Event('input'));"></i>
        </div>
    </div>

    <!-- Desktop 2-col layout wrapper -->
    <div class="desktop-grid">

        <!-- ── Shortcuts ── -->
        <section class="mb-10 desktop-col-full">
            <div class="flex items-center gap-2.5 mb-4">
                <div class="section-dot w-2 h-2 bg-yellow-500" style="background:var(--gold);box-shadow:0 0 12px var(--gold)"></div>
                <h3 class="sec-label" style="color:var(--gold-bright)" data-en="Internal Gateways" data-es="Puertas Internas">Internal Gateways</h3>
                <div class="flex-1 h-px" style="background:linear-gradient(to right,rgba(200,150,42,0.15),transparent)"></div>
            </div>
            <div class="grid grid-cols-4 sm:grid-cols-4 md:grid-cols-8 gap-2.5" id="shortcutsGrid"></div>
        </section>

        <!-- ── APKs ── -->
        <section class="mb-10">
            <div class="flex items-center gap-2.5 mb-4">
                <div class="section-dot w-2 h-2 bg-cyan-500" style="box-shadow:0 0 12px #00D4FF"></div>
                <h3 class="sec-label text-cyan-500" data-en="Binary Modules" data-es="Módulos Binarios">Binary Modules</h3>
                <div class="flex-1 h-px bg-gradient-to-r from-cyan-900/40 to-transparent"></div>
            </div>
            <div class="space-y-2.5" id="apkGrid"></div>
        </section>

        <!-- ── GAM ── -->
        <section class="mb-10">
            <div class="flex items-center gap-2.5 mb-4">
                <div class="section-dot w-2 h-2 bg-purple-500" style="box-shadow:0 0 12px #A855F7"></div>
                <h3 class="sec-label text-purple-400" data-en="Identity Keys" data-es="Llaves de Identidad">Identity Keys</h3>
                <div class="flex-1 h-px bg-gradient-to-r from-purple-900/40 to-transparent"></div>
            </div>
            <div class="grid grid-cols-2 gap-2.5" id="gamGrid"></div>
        </section>

    </div><!-- /desktop-grid -->
</main>

<!-- ───── Status Bar ───── -->
<div class="status-bar fixed bottom-0 inset-x-0 z-50 py-3 px-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-1.5 bg-cyan-500 rounded-full ping-dot"></div>
            <p class="text-[8px] text-cyan-900 font-mono tracking-[0.2em] uppercase">Kernel: 0x8A2K // Secure Link</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[8px] font-mono text-slate-700 tracking-widest">SYS OK</span>
            <div class="flex gap-1.5">
                <div class="w-1 h-1 bg-cyan-700 rounded-full"></div>
                <div class="w-1 h-1 bg-cyan-500 rounded-full"></div>
                <div class="w-1 h-1 bg-cyan-300 rounded-full ping-dot"></div>
            </div>
        </div>
    </div>
</div>

<script>
    /* ── Background particles ── */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const GLYPHS = ['◈', '◆', '01', 'A2K', 'FRP', '▸', '0x', '//'];

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    function mkP() {
        return {
            x: Math.random() * W,
            y: H + 20,
            vy: -(Math.random() * 0.35 + 0.08),
            vx: (Math.random() - 0.5) * 0.2,
            alpha: Math.random() * 0.1 + 0.03,
            size: Math.random() * 7 + 8,
            glyph: GLYPHS[Math.floor(Math.random() * GLYPHS.length)],
            life: 0,
            maxLife: Math.random() * 600 + 400
        };
    }
    for (let i = 0; i < 25; i++) { const p = mkP(); p.y = Math.random() * H; particles.push(p); }

    (function frame() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p, i) => {
            p.life++; p.x += p.vx; p.y += p.vy;
            if (p.life > p.maxLife || p.y < -20) { particles[i] = mkP(); return; }
            ctx.globalAlpha = p.alpha * (1 - p.life / p.maxLife);
            ctx.fillStyle = '#00D4FF';
            ctx.font = `${p.size}px 'Share Tech Mono'`;
            ctx.fillText(p.glyph, p.x, p.y);
        });
        requestAnimationFrame(frame);
    })();

    /* ── Data ── */
    const tools = {
        shortcuts: [
            { name: "Settings",      icon: "fa-gear",               color: "icon-settings", url: "intent://com.android.settings/#Intent;scheme=android-app;end" },
            { name: "Google",        icon: "fa-brands fa-google",   color: "icon-google",   url: "intent://com.google.android.googlequicksearchbox/#Intent;scheme=android-app;end" },
            { name: "Knox Lock",     icon: "fa-shield-halved",      color: "icon-samsung",  url: "intent://com.android.settings.password.ScreenLockSuggestionActivity/#Intent;scheme=android-app;end" },
            { name: "Assistant",     icon: "fa-microphone",         color: "icon-google",   url: "intent://com.google.android.apps.googleassistant/#Intent;scheme=android-app;end" },
            { name: "Samsung Files", icon: "fa-folder-closed",      color: "icon-samsung",  url: "intent://com.sec.android.app.myfiles/#Intent;scheme=android-app;end" },
            { name: "Browser",       icon: "fa-brands fa-chrome",   color: "icon-chrome",   url: "intent://com.sec.android.app.sbrowser/#Intent;scheme=android-app;end" },
            { name: "Radio Dial",    icon: "fa-phone-flip",         color: "text-green-400",url: "tel:*#*#4636#*#*" },
            { name: "Dev Mode",      icon: "fa-code",               color: "text-cyan-400", url: "intent://com.android.settings.Settings$DevelopmentSettingsActivity/#Intent;scheme=android-app;end" }
        ],
        apks: [
            { name: "FRP Bypass Pro",     size: "1.2 MB", tag: "BYPASS", icon: "fa-unlock-keyhole", url: "https://frpbypass.romstage.com/FRP_Bypass.apk" },
            { name: "Alliance Shield X",  size: "15 MB",  tag: "SHIELD", icon: "fa-shield-virus",   url: "https://frpbypass.romstage.com/Alliance_Shield.apk" },
            { name: "QuickShortcutMaker", size: "2 MB",   tag: "UTIL",   icon: "fa-bolt",           url: "https://frpbypass.romstage.com/QuickShortcutMaker.apk" },
            { name: "vnROM Bypass",       size: "28 MB",  tag: "ROM",    icon: "fa-microchip",      url: "https://frpbypass.romstage.com/vnROM_Bypass.apk" },
            { name: "Technocare Tr.",      size: "11 MB",  tag: "PATCH",  icon: "fa-screwdriver-wrench", url: "https://frpbypass.romstage.com/Technocare.apk" }
        ],
        gam: [
            { name: "Identity Manager 10", ver: "10.0" },
            { name: "Identity Manager 9",  ver: "9.0"  },
            { name: "Identity Manager 8",  ver: "8.1"  },
            { name: "Identity Manager 6",  ver: "6.0"  }
        ]
    };

    let currentLang = 'en';

    /* ── Render ── */
    function render(filter = "") {
        const f = filter.toLowerCase();

        /* Shortcuts */
        document.getElementById('shortcutsGrid').innerHTML =
            tools.shortcuts.filter(i => i.name.toLowerCase().includes(f)).map(item => `
                <a href="${item.url}" class="shortcut-card fade-up p-3.5 flex flex-col items-center gap-2.5">
                    <i class="fas ${item.icon} ${item.color} text-sm"></i>
                    <span class="text-[8px] font-bold uppercase tracking-widest text-slate-400 truncate w-full text-center leading-tight">${item.name}</span>
                </a>
            `).join('');

        /* APKs */
        document.getElementById('apkGrid').innerHTML =
            tools.apks.filter(i => i.name.toLowerCase().includes(f)).map(item => `
                <div class="apk-row fade-up flex items-center gap-3 p-3 sm:p-4">
                    <div class="apk-icon-wrap flex-shrink-0">
                        <i class="fas ${item.icon} text-cyan-500 text-xs"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-0.5">
                            <h4 class="text-xs font-bold text-white tracking-wide uppercase truncate">${item.name}</h4>
                            <span class="hidden sm:inline-block text-[7px] font-mono bg-cyan-950/50 border border-cyan-900/40 text-cyan-700 px-1.5 py-0.5 tracking-widest flex-shrink-0">${item.tag}</span>
                        </div>
                        <p class="text-[9px] text-slate-600 font-mono tracking-widest">${item.size}</p>
                    </div>
                    <a href="${item.url}" class="btn-exec">Execute</a>
                </div>
            `).join('');

        /* GAM */
        document.getElementById('gamGrid').innerHTML =
            tools.gam.filter(i => i.name.toLowerCase().includes(f)).map(item => `
                <a href="https://frpbypass.romstage.com/GAM_${item.ver}.apk" class="gam-card fade-up p-3.5 flex flex-col gap-1.5">
                    <div class="flex items-start justify-between gap-1">
                        <span class="text-[10px] font-bold text-white tracking-wide uppercase leading-tight">${item.name}</span>
                        <i class="fas fa-key text-purple-700 text-[9px] flex-shrink-0 mt-0.5"></i>
                    </div>
                    <span class="text-[8px] text-purple-500 font-mono tracking-widest">SIG: v${item.ver}</span>
                    <div class="flex items-center gap-1.5 mt-1">
                        <div class="w-1 h-1 bg-purple-700 rounded-full"></div>
                        <span class="text-[7px] font-mono text-purple-900 uppercase tracking-widest">Download</span>
                    </div>
                </a>
            `).join('');
    }

    /* ── Language Toggle ── */
    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'es' : 'en';
        const t = {
            en: { d: "Advanced Device Management System. Decrypting protection layers via integrated logic engine.", l: "EN", f: "https://flagcdn.com/w40/us.png", tag: "▸ A2K Systems · Tool 002" },
            es: { d: "Sistema de gestión avanzada. Descifrando capas de protección mediante lógica integrada.", l: "ES", f: "https://flagcdn.com/w40/mx.png", tag: "▸ A2K Sistemas · Herramienta 002" }
        };
        document.getElementById('heroTitle').innerHTML = `<span class="blue-brand">FRP</span><br><span class="glow-white">A2K</span>`;
        document.getElementById('heroDesc').innerText = t[currentLang].d;
        document.getElementById('langLabel').innerText = t[currentLang].l;
        document.getElementById('langFlag').src = t[currentLang].f;
        document.querySelector('[data-i18n="tag"]').innerText = t[currentLang].tag;
        document.querySelectorAll('[data-en]').forEach(el => {
            el.innerText = el.getAttribute(`data-${currentLang}`);
        });
    }

    /* ── Search ── */
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');
    searchInput.addEventListener('input', e => {
        const v = e.target.value;
        clearBtn.style.display = v ? 'block' : 'none';
        render(v);
    });

    document.getElementById('toggleLang').addEventListener('click', toggleLanguage);

    window.onload = () => render();
</script>
</body>
</html>
