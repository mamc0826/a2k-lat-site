<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A2K - FRP Bypass Aztec</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --aztec-gold: #d4af37;
            --obsidian: #05070a;
            --circuit-line: rgba(212, 175, 55, 0.15);
        }

        body {
            background-color: var(--obsidian);
            color: #f8fafc;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-image: 
                radial-gradient(circle at 2px 2px, var(--circuit-line) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* Subtle Integrated Circuit Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, var(--circuit-line) 1px, transparent 1px) 0 0 / 100px 100px,
                linear-gradient(0deg, var(--circuit-line) 1px, transparent 1px) 0 0 / 100px 100px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.5;
        }

        .glass-header {
            background: rgba(5, 7, 10, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--aztec-gold);
        }

        .tool-card {
            background: #0c121d;
            border: 1px solid #1e293b;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Aztec Geometric Corner */
        .tool-card::after {
            content: "";
            position: absolute;
            top: -10px;
            right: -10px;
            width: 20px;
            height: 20px;
            background: var(--aztec-gold);
            transform: rotate(45deg);
            opacity: 0.2;
        }

        .tool-card:active {
            transform: translateY(2px);
            border-color: var(--aztec-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .search-bar {
            background: #111827;
            border: 1px solid #374151;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .search-bar:focus-within {
            border-color: var(--aztec-gold);
        }

        .aztec-border {
            border-style: solid;
            border-image: repeating-linear-gradient(45deg, var(--aztec-gold), var(--aztec-gold) 2px, transparent 2px, transparent 10px) 1;
        }

        .btn-gold {
            background: var(--aztec-gold);
            color: black;
            font-weight: 800;
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen selection:bg-yellow-500/30">

    <!-- A2K Header -->
    <header class="glass-header sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 border-2 border-yellow-600 flex items-center justify-center bg-black rotate-45">
                    <i class="fas fa-microchip text-yellow-500 -rotate-45 text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-[0.2em] text-white">A2K</h1>
                    <div class="h-0.5 w-full bg-yellow-600 opacity-50"></div>
                </div>
            </div>
            <button id="toggleLang" class="text-[10px] font-bold border border-yellow-600/50 text-yellow-500 px-4 py-1.5 rounded-sm uppercase tracking-widest hover:bg-yellow-600 hover:text-black transition-all">
                EN / ES
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pt-8 pb-24">
        <!-- Hero Section -->
        <div class="mb-8 border-l-4 border-yellow-600 pl-4">
            <h2 id="heroTitle" class="text-2xl font-bold text-white tracking-tight">System Bypass</h2>
            <p id="heroDesc" class="text-xs text-slate-400 leading-relaxed max-w-xs">Authorized technician portal. Decrypting protection layers via integrated logic.</p>
        </div>

        <!-- Search with Aztec Motif -->
        <div class="sticky top-[75px] z-40 bg-slate-950/20 backdrop-blur-md py-3 mb-8">
            <div class="search-bar flex items-center px-4 py-3 rounded-sm">
                <i class="fas fa-fingerprint text-yellow-600 text-sm mr-3"></i>
                <input type="text" id="searchInput" placeholder="Identify tool signature..." class="bg-transparent border-none outline-none text-sm w-full placeholder:text-slate-700 text-yellow-100">
            </div>
        </div>

        <!-- Shortcuts -->
        <section class="mb-10">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                <h3 class="text-[11px] font-bold uppercase tracking-[0.3em] text-yellow-600 section-title" data-en="Logic Gates" data-es="Puertas Lógicas">Logic Gates</h3>
            </div>
            <div class="grid grid-cols-3 sm:grid-cols-4 gap-3" id="shortcutsGrid">
                <!-- Shortcuts Injected Here -->
            </div>
        </section>

        <!-- Essential APKs -->
        <section class="mb-10">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <h3 class="text-[11px] font-bold uppercase tracking-[0.3em] text-green-600 section-title" data-en="Data Modules" data-es="Módulos de Datos">Data Modules</h3>
            </div>
            <div class="space-y-3" id="apkGrid">
                <!-- APKs Injected Here -->
            </div>
        </section>

        <!-- Account Managers -->
        <section>
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-2 bg-purple-500 rounded-full animate-pulse"></div>
                <h3 class="text-[11px] font-bold uppercase tracking-[0.3em] text-purple-600 section-title" data-en="Identity Overrides" data-es="Anuladores de Identidad">Identity Overrides</h3>
            </div>
            <div class="grid grid-cols-2 gap-3" id="gamGrid">
                <!-- GAMs Injected Here -->
            </div>
        </section>
    </main>

    <!-- Bottom Status Bar -->
    <div class="fixed bottom-0 inset-x-0 glass-header border-t border-yellow-900/30 p-4 flex justify-between items-center">
        <p class="text-[9px] text-yellow-700 font-bold uppercase tracking-widest">Protocol A2K-v2.0</p>
        <div class="flex gap-1">
            <div class="w-1 h-1 bg-yellow-600"></div>
            <div class="w-1 h-1 bg-yellow-600"></div>
            <div class="w-1 h-1 bg-yellow-600"></div>
        </div>
    </div>

    <script>
        const tools = {
            shortcuts: [
                { name: "Settings", icon: "fa-cog", url: "intent://com.android.settings/#Intent;scheme=android-app;end" },
                { name: "Search", icon: "fa-search", url: "intent://com.google.android.googlequicksearchbox/#Intent;scheme=android-app;end" },
                { name: "Lock Screen", icon: "fa-lock", url: "intent://com.android.settings.password.ScreenLockSuggestionActivity/#Intent;scheme=android-app;end" },
                { name: "Assistant", icon: "fa-microphone", url: "intent://com.google.android.apps.googleassistant/#Intent;scheme=android-app;end" },
                { name: "My Files", icon: "fa-folder-open", url: "intent://com.sec.android.app.myfiles/#Intent;scheme=android-app;end" },
                { name: "Browser", icon: "fa-globe", url: "intent://com.sec.android.app.sbrowser/#Intent;scheme=android-app;end" },
                { name: "Dial Pad", icon: "fa-phone", url: "tel:*#*#4636#*#*" },
                { name: "Hidden", icon: "fa-mask", url: "intent://com.android.settings.Settings$DevelopmentSettingsActivity/#Intent;scheme=android-app;end" }
            ],
            apks: [
                { name: "FRP Bypass .apk", size: "1.2MB", url: "https://frpbypass.romstage.com/FRP_Bypass.apk" },
                { name: "Alliance Shield", size: "15MB", url: "https://frpbypass.romstage.com/Alliance_Shield.apk" },
                { name: "QuickShortcutMaker", size: "2MB", url: "https://frpbypass.romstage.com/QuickShortcutMaker.apk" },
                { name: "vnROM Bypass", size: "28MB", url: "https://frpbypass.romstage.com/vnROM_Bypass.apk" },
                { name: "Technocare", size: "11MB", url: "https://frpbypass.romstage.com/Technocare.apk" }
            ],
            gam: [
                { name: "GAM Android 10", ver: "10.0" },
                { name: "GAM Android 9", ver: "9.0" },
                { name: "GAM Android 8", ver: "8.1" },
                { name: "GAM Android 6", ver: "6.0" }
            ]
        };

        let currentLang = 'en';

        function render(filter = "") {
            const f = filter.toLowerCase();
            const sGrid = document.getElementById('shortcutsGrid');
            const aGrid = document.getElementById('apkGrid');
            const gGrid = document.getElementById('gamGrid');

            sGrid.innerHTML = tools.shortcuts.filter(i => i.name.toLowerCase().includes(f)).map(item => `
                <a href="${item.url}" class="tool-card p-4 rounded-sm flex flex-col items-center gap-2 border-b-2 border-yellow-900/20">
                    <i class="fas ${item.icon} text-yellow-500 text-sm"></i>
                    <span class="text-[9px] font-bold uppercase tracking-tighter truncate w-full text-center text-slate-300">${item.name}</span>
                </a>
            `).join('');

            aGrid.innerHTML = tools.apks.filter(i => i.name.toLowerCase().includes(f)).map(item => `
                <div class="tool-card p-4 rounded-sm flex items-center justify-between border-l-2 border-green-900/30">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-green-500/5 flex items-center justify-center border border-green-500/20">
                            <i class="fas fa-layer-group text-green-500 text-xs"></i>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold text-white uppercase tracking-wider">${item.name}</h4>
                            <p class="text-[9px] text-slate-500 font-mono tracking-widest">${item.size}</p>
                        </div>
                    </div>
                    <a href="${item.url}" class="btn-gold px-4 py-2 rounded-sm text-[10px] shadow-[0_0_10px_rgba(212,175,55,0.2)]">EXECUTE</a>
                </div>
            `).join('');

            gGrid.innerHTML = tools.gam.filter(i => i.name.toLowerCase().includes(f)).map(item => `
                <a href="https://frpbypass.romstage.com/GAM_${item.ver}.apk" class="tool-card p-3 rounded-sm flex flex-col gap-1 border-r-2 border-purple-900/40">
                    <span class="text-[10px] font-black text-white tracking-widest uppercase">${item.name}</span>
                    <span class="text-[9px] text-purple-400 font-mono">ID_VER: ${item.ver}</span>
                </a>
            `).join('');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            const t = {
                en: { h: "System Bypass", d: "Authorized technician portal. Decrypting protection layers via integrated logic." },
                es: { h: "Bypass del Sistema", d: "Portal técnico autorizado. Descifrando capas de protección mediante lógica integrada." }
            };
            document.getElementById('heroTitle').innerText = t[currentLang].h;
            document.getElementById('heroDesc').innerText = t[currentLang].d;
            document.querySelectorAll('.section-title').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));
        document.getElementById('toggleLang').addEventListener('click', toggleLanguage);

        window.onload = () => render();
    </script>
</body>
</html>
